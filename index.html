    // ===============================================================
    // MARKETPLACES — URLs de busqueda en sitios marroquies
    // Avito.ma, Moteur.ma, Wandaloo.com
    // Solo marca + modelo + ano (D-16), sin peticiones de red
    // ===============================================================
    var Marketplaces = {
      /**
       * Normalizar texto para uso en URLs: minusculas, espacios a guion,
       * acentos franceses a ASCII.
       */
      _slug: function(str) {
        return str.toLowerCase()
          .replace(/\s+/g, '-')
          .replace(/[éèê]/g, 'e')
          .replace(/[àâ]/g, 'a')
          .replace(/[ô]/g, 'o')
          .replace(/[ûù]/g, 'u')
          .replace(/[ç]/g, 'c')
          .replace(/[ï]/g, 'i');
      },

      /**
       * Generar URLs de busqueda para 3 marketplaces MA.
       * @param {string} make - Marca (ej: 'Dacia')
       * @param {string} model - Modelo (ej: 'Logan')
       * @param {number|string} year - Ano (ej: 2019)
       * @returns {{ avito: string, moteur: string, wandaloo: string }}
       */
      getLinks: function(make, model, year) {
        var slugMake = this._slug(make);
        var slugModel = this._slug(model);

        return {
          // Avito.ma — URL verificada via web search (RESEARCH.md)
          // Patron: /sp/voitures/{marca}-{modelo}-{ano}
          avito: 'https://www.avito.ma/sp/voitures/' + slugMake + '-' + slugModel + '-' + year,

          // Moteur.ma — URL parcialmente verificada
          // Patron: /fr/voiture/achat-voiture-occasion/marque/{marca}/modele/{modelo}/
          moteur: 'https://www.moteur.ma/fr/voiture/achat-voiture-occasion/marque/' + slugMake + '/modele/' + slugModel + '/',

          // Wandaloo — fallback con query string general (usa IDs internos, no slugs)
          // Patron: busqueda general con query string
          wandaloo: 'https://www.wandaloo.com/occasion/voiture-occasion-maroc-annonce.html?q=' + encodeURIComponent(make + ' ' + model + ' ' + year)
        };
      }
    };

    // ===============================================================
    // ESTIMER FORM — Formulario de valoración
    // Cascada: marca → modelo → año desde CAR_DB
    // Submit handler se añade en plan 04-02
    // ===============================================================
    var EstimerForm = {

      /**
       * Poblar el select de marcas con las claves de CAR_DB (ordenadas).
       * Llamado una vez al init.
       */
      _populateMakes: function() {
        var makeSelect = document.getElementById('field-make');
        if (!makeSelect) return;
        // Conservar la option vacía inicial (primer hijo)
        var placeholder = makeSelect.querySelector('option[value=""]');
        makeSelect.innerHTML = '';
        if (placeholder) makeSelect.appendChild(placeholder);
        Object.keys(CAR_DB).sort().forEach(function(make) {
          var opt = document.createElement('option');
          opt.value = make;
          opt.textContent = make;
          makeSelect.appendChild(opt);
        });
      },

      /**
       * Poblar el select de modelos para una marca dada.
       * Si make es vacío/nulo, deshabilita el select y limpia las opciones.
       * @param {string} make
       */
      _populateModels: function(make) {
        var modelSelect = document.getElementById('field-model');
        if (!modelSelect) return;
        var placeholder = modelSelect.querySelector('option[value=""]');
        modelSelect.innerHTML = '';
        if (placeholder) modelSelect.appendChild(placeholder);
        modelSelect.disabled = !make;
        modelSelect.value = '';
        if (!make || !CAR_DB[make]) return;
        Object.keys(CAR_DB[make]).sort().forEach(function(model) {
          var opt = document.createElement('option');
          opt.value = model;
          opt.textContent = model;
          modelSelect.appendChild(opt);
        });
      },

      /**
       * Poblar el select de años para marca+modelo dados.
       * Orden descendente: año más reciente primero.
       * Si make o model están vacíos, deshabilita el select.
       * @param {string} make
       * @param {string} model
       */
      _populateYears: function(make, model) {
        var yearSelect = document.getElementById('field-year');
        if (!yearSelect) return;
        var placeholder = yearSelect.querySelector('option[value=""]');
        yearSelect.innerHTML = '';
        if (placeholder) yearSelect.appendChild(placeholder);
        yearSelect.disabled = !(make && model);
        yearSelect.value = '';
        if (!make || !model || !CAR_DB[make] || !CAR_DB[make][model]) return;
        var range = CAR_DB[make][model].years; // [minYear, maxYear]
        for (var y = range[1]; y >= range[0]; y--) {
          var opt = document.createElement('option');
          opt.value = String(y);
          opt.textContent = String(y);
          yearSelect.appendChild(opt);
        }
      },

      /**
       * Recalcular el estado del botón submit.
       * Disabled si marca, modelo o año están sin seleccionar.
       */
      _updateSubmitState: function() {
        var make  = document.getElementById('field-make').value;
        var model = document.getElementById('field-model').value;
        var year  = document.getElementById('field-year').value;
        var btn   = document.getElementById('btn-estimer');
        if (btn) btn.disabled = !(make && model && year);
      },

      /**
       * Inicializar el formulario: poblar marcas, conectar listeners de cascada.
       * Llamado desde DOMContentLoaded.
       */
      init: function() {
        EstimerForm._populateMakes();

        var makeSelect  = document.getElementById('field-make');
        var modelSelect = document.getElementById('field-model');

        if (makeSelect) {
          makeSelect.addEventListener('change', function() {
            var make = makeSelect.value;
            EstimerForm._populateModels(make);
            EstimerForm._populateYears('', '');
            EstimerForm._updateSubmitState();
          });
        }

        if (modelSelect) {
          modelSelect.addEventListener('change', function() {
            var make  = document.getElementById('field-make').value;
            var model = modelSelect.value;
            EstimerForm._populateYears(make, model);
            EstimerForm._updateSubmitState();
          });
        }

        var yearSelect = document.getElementById('field-year');
        if (yearSelect) {
          yearSelect.addEventListener('change', function() {
            EstimerForm._updateSubmitState();
          });
        }

        // Estado inicial del botón (disabled por defecto, ya está en HTML)
        EstimerForm._updateSubmitState();
      }
    };

    // ===============================================================
    // HISTORY — Historial de valoraciones en localStorage
    // Fase 4: save() + getAll(). Fase 5 extiende con delete() y clear().
    // Clave localStorage: 'autoValeur_history'
    // ===============================================================
    var History = {
      _KEY: 'autoValeur_history',

      /**
       * Guardar una nueva entrada en el historial.
       * Genera id único via Date.now().
       * @param {object} entry - datos de la valoración (todos los campos, sin id ni date)
       */
      save: function(entry) {
        var all = History.getAll();
        var record = {
          id:              Date.now(),
          make:            entry.make,
          model:           entry.model,
          year:            entry.year,
          mileage:         entry.mileage,
          condition:       entry.condition,
          fuel:            entry.fuel,
          transmission:    entry.transmission,
          city:            entry.city,
          estimated_price: entry.estimated_price,
          price_range:     entry.price_range,
          breakdown:       entry.breakdown,
          date:            new Date().toISOString()
        };
        all.unshift(record);
        try {
          localStorage.setItem(History._KEY, JSON.stringify(all));
        } catch (e) {
          ErrorUI.showStorageBanner();
        }
      },

      /**
       * Obtener todas las entradas del historial.
       * Retorna [] si no hay datos o si el JSON está corrompido.
       */
      getAll: function() {
        try {
          var raw = localStorage.getItem(History._KEY);
          return raw ? JSON.parse(raw) : [];
        } catch (e) {
          History._corrupted = true;
          return [];
        }
      },

      /**
       * Eliminar una entrada del historial por id.
       * @param {number} id - timestamp id de la entrada (generado por Date.now())
       * @returns {Array} array actualizado sin la entrada eliminada
       */
      remove: function(id) {
        var all = History.getAll();
        var filtered = all.filter(function(entry) {
          return entry.id !== id;
        });
        try {
          localStorage.setItem(History._KEY, JSON.stringify(filtered));
        } catch (e) {
          ErrorUI.showStorageBanner();
        }
        return filtered;
      },

      /**
       * Limpiar todo el historial.
       * @returns {Array} array vacío []
       */
      clear: function() {
        try {
          localStorage.setItem(History._KEY, JSON.stringify([]));
        } catch (e) {
          ErrorUI.showStorageBanner();
        }
        return [];
      }
    };

    // ═══════════════════════════════════════════════════════════
    // MÓDULO: ErrorUI — Manejo de errores visible al usuario
    // Escenarios: localStorage bloqueado (banner), historial corrompido
    // (inline en Historique), formulario sin resultado (inline en Estimer).
    // ═══════════════════════════════════════════════════════════
    /* -- ErrorUI ------------------------------------------------ */
    var ErrorUI = {
      showStorageBanner: function() {
        var banner = document.getElementById('error-storage-banner');
        if (banner) {
          banner.hidden = false;
          I18n._applyTranslations(); // actualizar las cadenas del banner al idioma actual
        }
      },
      closeBanner: function() {
        var banner = document.getElementById('error-storage-banner');
        if (banner) { banner.hidden = true; }
      },
      showInline: function(containerId, i18nKey) {
        var container = document.getElementById(containerId);
        if (!container) return;
        // Eliminar error previo si existe
        var prev = container.querySelector('.error-inline');
        if (prev) prev.remove();
        var p = document.createElement('p');
        p.className = 'error-inline';
        p.setAttribute('data-i18n', i18nKey);
        p.textContent = I18n.t(i18nKey);
        container.appendChild(p);
      },
      clearInline: function(containerId) {
        var container = document.getElementById(containerId);
        if (!container) return;
        var prev = container.querySelector('.error-inline');
        if (prev) prev.remove();
      }
    };

    // ═══════════════════════════════════════════════════════════
    // UTILIDAD: Fecha relativa
    // ═══════════════════════════════════════════════════════════
    function formatRelativeDate(isoString) {
      var days = Math.floor((Date.now() - new Date(isoString).getTime()) / 86400000);
      if (days === 0) return I18n.t('date.today');
      if (days < 7)  return I18n.t('date.days_ago').replace('{n}', days);
      var weeks = Math.floor(days / 7);
      return I18n.t('date.weeks_ago').replace('{n}', weeks);
    }

    // ═══════════════════════════════════════════════════════════
    // MÓDULO: Historique — renderizado y gestión de la página
    // ═══════════════════════════════════════════════════════════
    var Historique = {
      init: function() {
        // Botón CTA del empty state
        var ctaBtn = document.getElementById('btn-history-cta');
        if (ctaBtn) {
          ctaBtn.addEventListener('click', function() {
            Router.navigate('estimer');
          });
        }
        // Botón Effacer tout — flujo 2 pasos con timeout 3s
        var clearBtn = document.getElementById('btn-clear-history');
        var clearTimer = null;
        var clearStep = 0;  // 0 = normal, 1 = esperando confirmación

        if (clearBtn) {
          clearBtn.addEventListener('click', function() {
            if (clearStep === 0) {
              // Paso 1: cambiar a estado "confirmar"
              clearStep = 1;
              clearBtn.textContent = I18n.t('historique.confirm_clear');
              clearBtn.className = 'btn-danger';

              // Timeout 3s: reset automático si no hay segundo clic
              clearTimer = setTimeout(function() {
                clearStep = 0;
                clearBtn.textContent = I18n.t('historique.clear');
                clearBtn.className = 'btn-outline-sm';
                clearTimer = null;
              }, 3000);

            } else if (clearStep === 1) {
              // Paso 2: confirmar borrado
              clearTimeout(clearTimer);
              clearTimer = null;
              clearStep = 0;
              History.clear();
              clearBtn.textContent = I18n.t('historique.clear');
              clearBtn.className = 'btn-outline-sm';
              Historique.render();
            }
          });
        }

        // Renderizado inicial
        Historique.render();
      },

      render: function() {
        var entries = History.getAll();
        var container = document.getElementById('history-list');
        var emptyState = document.getElementById('history-empty');
        var clearBtn = document.getElementById('btn-clear-history');

        if (!container) return;

        // Limpiar contenedor (sin datos de usuario en innerHTML — seguro)
        container.innerHTML = '';

        if (History._corrupted) {
          ErrorUI.showInline('page-historique', 'error.history.corrupt');
          History._corrupted = false;
        }

        if (entries.length === 0) {
          emptyState.hidden = false;
          container.hidden = true;
          if (clearBtn) clearBtn.hidden = true;
          return;
        }

        emptyState.hidden = true;
        container.hidden = false;
        if (clearBtn) clearBtn.hidden = false;

        entries.forEach(function(entry) {
          var card = document.createElement('div');
          card.className = 'history-card card';
          card.setAttribute('role', 'listitem');

          // Header: título + botón eliminar
          var header = document.createElement('div');
          header.className = 'history-card__header';

          // Título: Marca Modelo Año (textContent — XSS prevention)
          var title = document.createElement('p');
          title.className = 'history-card__title';
          title.textContent = entry.make + ' ' + entry.model + ' ' + entry.year;

          // Botón eliminar ×
          var deleteBtn = document.createElement('button');
          deleteBtn.className = 'btn-delete';
          deleteBtn.setAttribute('aria-label', I18n.t('historique.delete'));
          deleteBtn.textContent = '×';
          deleteBtn.dataset.id = entry.id;
          deleteBtn.addEventListener('click', function() {
            History.remove(Number(this.dataset.id));
            Historique.render();
          });

          header.appendChild(title);
          header.appendChild(deleteBtn);

          // Precio destacado
          var price = document.createElement('p');
          price.className = 'history-card__price';
          price.textContent = formatPrice(entry.estimated_price, I18n.currentLang);

          // Meta: km + fecha relativa
          var meta = document.createElement('p');
          meta.className = 'history-card__meta';
          var kmText = new Intl.NumberFormat('fr-FR').format(entry.mileage) + ' km';
          var dateText = formatRelativeDate(entry.date);
          meta.textContent = kmText + ' · ' + dateText;

          card.appendChild(header);
          card.appendChild(price);
          card.appendChild(meta);
          container.appendChild(card);
        });
      }
    };

    // ═══════════════════════════════════════════════════════════
    // MÓDULO: Comparer — comparación lado a lado de 2 estimaciones
    // ═══════════════════════════════════════════════════════════

    // === Función: determinar ganador por ratio precio/km ===
    function determineWinner(entryA, entryB) {
      // Si alguno tiene mileage === 0: gana el de precio menor
      if (entryA.mileage === 0 || entryB.mileage === 0) {
        if (entryA.estimated_price < entryB.estimated_price) return entryA;
        if (entryB.estimated_price < entryA.estimated_price) return entryB;
        return null; // empate
      }
      // Ratio precio/km — menor es mejor
      var ratioA = entryA.estimated_price / entryA.mileage;
      var ratioB = entryB.estimated_price / entryB.mileage;
      if (ratioA < ratioB) return entryA;
      if (ratioB < ratioA) return entryB;
      return null; // empate
    }

    var Comparer = {
      init: function() {
        // Botón CTA del estado vacío
        var ctaBtn = document.getElementById('btn-comparer-cta');
        if (ctaBtn) {
          ctaBtn.addEventListener('click', function() {
            Router.navigate('estimer');
          });
        }

        // Listeners de los selects — renderizado automático
        var selectA = document.getElementById('select-car-a');
        var selectB = document.getElementById('select-car-b');

        if (selectA) {
          selectA.addEventListener('change', function() { Comparer._onSelectChange(); });
        }
        if (selectB) {
          selectB.addEventListener('change', function() { Comparer._onSelectChange(); });
        }

        // Render inicial
        Comparer.render();
      },

      render: function() {
        var entries = History.getAll();
        var emptyDiv = document.getElementById('comparer-empty');
        var controlsDiv = document.getElementById('comparer-controls');
        var resultDiv = document.getElementById('comparer-result');

        if (!emptyDiv || !controlsDiv) return;

        if (entries.length < 2) {
          // Menos de 2 valoraciones — mostrar mensaje orientativo
          emptyDiv.hidden = false;
          controlsDiv.hidden = true;
          if (resultDiv) resultDiv.innerHTML = '';
          return;
        }

        // 2 o más valoraciones — mostrar selects
        emptyDiv.hidden = true;
        controlsDiv.hidden = false;

        // Re-poblar los selects (Pitfall 7 prevenido: siempre re-poblar al render)
        var selectA = document.getElementById('select-car-a');
        var selectB = document.getElementById('select-car-b');

        if (!selectA || !selectB) return;

        var prevA = selectA.value;
        var prevB = selectB.value;

        // Limpiar opciones excepto placeholder
        selectA.innerHTML = '<option value=""></option>';
        selectB.innerHTML = '<option value=""></option>';

        entries.forEach(function(entry) {
          var label = entry.make + ' ' + entry.model + ' ' + entry.year + ' — ' + formatPrice(entry.estimated_price, I18n.currentLang);

          var optA = document.createElement('option');
          optA.value = entry.id;
          optA.textContent = label;  // textContent — XSS prevention
          selectA.appendChild(optA);

          var optB = document.createElement('option');
          optB.value = entry.id;
          optB.textContent = label;  // textContent — XSS prevention
          selectB.appendChild(optB);
        });

        // Restaurar selecciones previas si los ids siguen válidos
        if (prevA && selectA.querySelector('option[value="' + prevA + '"]')) {
          selectA.value = prevA;
        }
        if (prevB && selectB.querySelector('option[value="' + prevB + '"]')) {
          selectB.value = prevB;
        }

        // Re-renderizar comparación si ambos selects tienen valor válido
        Comparer._onSelectChange();
      },

      _onSelectChange: function() {
        var selectA = document.getElementById('select-car-a');
        var selectB = document.getElementById('select-car-b');
        var resultDiv = document.getElementById('comparer-result');

        if (!selectA || !selectB || !resultDiv) return;

        var idA = selectA.value;
        var idB = selectB.value;

        // Validar: ambos deben tener valor y ser distintos
        if (!idA || !idB || idA === idB) {
          resultDiv.innerHTML = '';
          return;
        }

        var entries = History.getAll();
        var entryA = null;
        var entryB = null;

        entries.forEach(function(e) {
          if (String(e.id) === String(idA)) entryA = e;
          if (String(e.id) === String(idB)) entryB = e;
        });

        if (!entryA || !entryB) {
          resultDiv.innerHTML = '';
          return;
        }

        Comparer.renderComparison(entryA, entryB);
      },

      renderComparison: function(entryA, entryB) {
        var resultDiv = document.getElementById('comparer-result');
        if (!resultDiv) return;

        // Limpiar resultado anterior
        resultDiv.innerHTML = '';

        // Calcular barras proporcionales
        var maxPrice = Math.max(entryA.estimated_price, entryB.estimated_price);
        var widthA = maxPrice > 0 ? (entryA.estimated_price / maxPrice * 100).toFixed(2) : 0;
        var widthB = maxPrice > 0 ? (entryB.estimated_price / maxPrice * 100).toFixed(2) : 0;

        // Determinar ganador
        var winner = determineWinner(entryA, entryB);

        var grid = document.createElement('div');
        grid.className = 'compare-grid';

        [[entryA, widthA], [entryB, widthB]].forEach(function(pair, index) {
          var entry = pair[0];
          var barWidth = pair[1];
          var isWinner = winner && winner.id === entry.id;

          var card = document.createElement('div');
          card.className = isWinner ? 'compare-card compare-winner' : 'compare-card';
          card.dataset.entryId = entry.id;

          // Badge "Meilleur rapport" — solo para el ganador
          if (isWinner) {
            var badge = document.createElement('span');
            badge.className = 'badge';
            badge.textContent = I18n.t('comparer.winner_badge');
            card.appendChild(badge);
          }

          // Label A / B
          var label = document.createElement('p');
          label.className = 'compare-card__label';
          label.textContent = index === 0 ? 'A' : 'B';

          // Título: Marca Modelo Año (textContent — XSS prevention)
          var title = document.createElement('p');
          title.className = 'compare-card__title';
          title.textContent = entry.make + ' ' + entry.model + ' ' + entry.year;

          // Precio destacado
          var price = document.createElement('p');
          price.className = 'compare-card__price';
          price.textContent = formatPrice(entry.estimated_price, I18n.currentLang);

          // Meta: km
          var meta = document.createElement('p');
          meta.className = 'compare-card__meta';
          meta.textContent = new Intl.NumberFormat('fr-FR').format(entry.mileage) + ' km';

          // Barra de precio proporcional
          var barTrack = document.createElement('div');
          barTrack.className = 'compare-bar-track';

          var bar = document.createElement('div');
          bar.className = 'compare-bar';
          // Forzar reflow para que la animación CSS (transition) se dispare correctamente
          // Primero width: 0%, luego en el siguiente frame el width real
          bar.style.width = '0%';
          barTrack.appendChild(bar);

          card.appendChild(label);
          card.appendChild(title);
          card.appendChild(price);
          card.appendChild(meta);
          card.appendChild(barTrack);
          grid.appendChild(card);

          // Animar la barra al frame siguiente (permite que la transición CSS se active)
          (function(b, w) {
            requestAnimationFrame(function() {
              b.style.width = w + '%';
            });
          })(bar, barWidth);
        });

        resultDiv.appendChild(grid);
      }
    };

    // ═══════════════════════════════════════════════════════════
    // ROUTER — Hash-based SPA navigation
    // Cada página es una <section class="page" id="page-X">.
    // La navegación usa location.hash; el botón Atrás funciona
    // de forma nativa porque cada hash push añade entrada al
    // historial del browser.
    // ═══════════════════════════════════════════════════════════

    const ROUTES = {
      '':           'estimer',
      'estimer':    'estimer',
      'historique': 'historique',
      'comparer':   'comparer'
    };

    const Router = {
      /**
       * Navegar a una página por nombre.
       * Usa location.hash = (no location.replace) para que el
       * botón Atrás funcione correctamente.
       * @param {string} page - 'estimer' | 'historique' | 'comparer'
       */
      navigate(page) {
        location.hash = page;
      },

      /**
       * Leer el hash actual y mostrar la página correspondiente.
       * Llamado en 'hashchange' y en 'DOMContentLoaded'.
       */
      _show() {
        const hash = location.hash.replace('#', '') || 'estimer';
        const pageId = ROUTES[hash] || 'estimer';

        // Ocultar todas las páginas
        document.querySelectorAll('.page').forEach(function(p) {
          p.hidden = true;
        });

        // Mostrar la página activa
        const target = document.getElementById('page-' + pageId);
        if (target) {
          target.hidden = false;
        }

        // Actualizar estado activo en la nav inferior
        document.querySelectorAll('.nav-item').forEach(function(btn) {
          btn.classList.toggle('active', btn.dataset.page === pageId);
        });
      },

      /**
       * Inicializar el router: conectar botones de nav y
       * mostrar la página correcta según el hash inicial.
       */
      init() {
        // Escuchar cambios de hash (botón Atrás incluido)
        window.addEventListener('hashchange', function() {
          Router._show();
          // Re-render Historique al navegar a esa página
          if (typeof Historique !== 'undefined') Historique.render();
          // Re-render Comparer al navegar a esa página (Pitfall 7 prevenido)
          if (location.hash === '#comparer') {
            if (typeof Comparer !== 'undefined') Comparer.render();
          }
        });

        // Conectar botones de la nav inferior
        document.querySelectorAll('.nav-item').forEach(function(btn) {
          btn.addEventListener('click', function() {
            Router.navigate(btn.dataset.page);
          });
        });

        // Mostrar la página inicial según el hash (o Estimer por defecto)
        Router._show();
      }
    };

    // ═══════════════════════════════════════════════════════════
    // INIT — Arrancar cuando el DOM esté listo
    // ═══════════════════════════════════════════════════════════
    document.addEventListener('DOMContentLoaded', function() {
      I18n.init();
      Router.init();
      EstimerForm.init();
      Historique.init();
      Comparer.init();


      // ── SUBMIT HANDLER — Formulario Estimer ─────────────────────────
      document.getElementById('estimer-form').addEventListener('submit', function(e) {
        e.preventDefault();

        // 1. Recoger valores del formulario
        var make         = document.getElementById('field-make').value;
        var model        = document.getElementById('field-model').value;
        var year         = parseInt(document.getElementById('field-year').value, 10);
        var mileageRaw   = document.getElementById('field-mileage').value;
        var mileage      = parseInt(mileageRaw, 10);
        var condition    = document.getElementById('field-condition').value;
        var fuel         = document.getElementById('field-fuel').value;
        var transmission = document.getElementById('field-transmission').value;
        var city         = document.getElementById('field-city').value;

        // 2. Validar km (D-04)
        var mileageError = document.getElementById('mileage-error');
        if (!mileageRaw || isNaN(mileage) || mileage <= 0) {
          mileageError.hidden = false;
          document.getElementById('field-mileage').focus();
          return;
        }
        mileageError.hidden = true;

        // 3. Llamar Engine.estimate()
        var result = Engine.estimate({
          make: make,
          model: model,
          year: year,
          mileage: mileage,
          condition: condition,
          fuel: fuel,
          transmission: transmission,
          city: city
        });
        if (!result) {
          ErrorUI.showInline('page-estimer', 'error.form.no_result');
          return;
        }
        // Si había un error previo, limpiarlo
        ErrorUI.clearInline('page-estimer');

        // 4. Guardar en historial (D-12, EST-06)
        History.save({
          make:            make,
          model:           model,
          year:            year,
          mileage:         mileage,
          condition:       condition,
          fuel:            fuel,
          transmission:    transmission,
          city:            city,
          estimated_price: result.estimated_price,
          price_range:     result.price_range,
          breakdown:       result.breakdown
        });

        // 5. Renderizar resultado
        renderResult(result, make, model, year);

        // 6. Scroll suave al resultado (D-06)
        document.getElementById('result-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
      });

      // ── FUNCIÓN renderResult() — orquesta el renderizado del resultado ──
      function renderResult(result, make, model, year) {
        // Rellenar precio y rango (IDs creados por Plan 04-03)
        var priceEl = document.getElementById('result-price');
        var rangeEl = document.getElementById('result-range');
        if (priceEl) {
          priceEl.textContent = formatPrice(result.estimated_price, I18n.currentLang);
        }
        if (rangeEl) {
          rangeEl.textContent =
            formatPrice(result.price_range.min, I18n.currentLang) +
            ' – ' +
            formatPrice(result.price_range.max, I18n.currentLang);
        }

        // Renderizar tabla de desglose (función añadida por Plan 04-04)
        if (typeof renderBreakdown === 'function') {
          renderBreakdown(result.breakdown);
        }

        // Renderizar chips de marketplaces (función añadida por Plan 04-05)
        if (typeof renderMarketplaces === 'function') {
          renderMarketplaces(make, model, year);
        }

        // Mostrar #result-section con animación (D-08):
        // Secuencia: quitar hidden → forzar reflow → añadir .visible
        var resultSection = document.getElementById('result-section');
        resultSection.hidden = false;
        resultSection.offsetHeight; // forzar reflow para activar CSS transition
        resultSection.classList.add('visible');
      }

      // ── BOTÓN "Nouvelle estimation" (D-11) ──────────────────────────
      document.getElementById('btn-new-estimate').addEventListener('click', function() {
        // Limpiar formulario a estado inicial
        document.getElementById('estimer-form').reset();
        EstimerForm._populateModels('');
        EstimerForm._populateYears('', '');
        EstimerForm._updateSubmitState();

        // Ocultar también la sección de marketplaces (D-15)
        var marketplaceSection = document.getElementById('marketplace-section');
        if (marketplaceSection) marketplaceSection.hidden = true;

        // Ocultar resultado con animación (quitar .visible, esperar transición, poner hidden)
        var resultSection = document.getElementById('result-section');
        resultSection.classList.remove('visible');
        setTimeout(function() {
          resultSection.hidden = true;
        }, 250);

        // Scroll al top de la página Estimer
        document.getElementById('page-estimer').scrollIntoView({ behavior: 'smooth', block: 'start' });
      });

      // ── TABLA DE DESGLOSE — mapeo índice → clave i18n ──────────────
      var BREAKDOWN_KEYS = [
        'result.breakdown.base',          // [0] Prix de base (siempre neutro)
        'result.breakdown.age',           // [1] Âge
        'result.breakdown.km',            // [2] Kilométrage
        'result.breakdown.condition',     // [3] État
        'result.breakdown.fuel',          // [4] Carburant
        'result.breakdown.city',          // [5] Ville
        'result.breakdown.transmission'   // [6] Transmission
      ];

      function renderBreakdown(breakdown) {
        var tbody = document.getElementById('breakdown-body');
        if (!tbody) return;
        tbody.innerHTML = '';
        breakdown.forEach(function(row, i) {
          var tr = document.createElement('tr');
          // Determinar clase de color (D-10): primera fila siempre neutra
          var factorClass = 'factor-neutral';
          if (i > 0) {
            if (row.factor > 1.0)       factorClass = 'factor-up';
            else if (row.factor < 1.0)  factorClass = 'factor-down';
          }
          tr.innerHTML =
            '<td>' + I18n.t(BREAKDOWN_KEYS[i]) + '</td>' +
            '<td class="' + factorClass + '">\u00d7' + row.factor.toFixed(2) + '</td>' +
            '<td class="' + factorClass + '">' + formatPrice(row.amount_dh, I18n.currentLang) + '</td>';
          tbody.appendChild(tr);
        });
      }

      // ── CHIPS DE MARKETPLACES (D-14, EST-07) ────────────────────────
      function renderMarketplaces(make, model, year) {
        var links = Marketplaces.getLinks(make, model, year);
        document.getElementById('link-avito').href    = links.avito;
        document.getElementById('link-moteur').href   = links.moteur;
        document.getElementById('link-wandaloo').href = links.wandaloo;
        var section = document.getElementById('marketplace-section');
        if (section) section.hidden = false;
      }

      console.log('AutoValeur MA — i18n + Router + EstimerForm inicializados');
    });

    // ═══════════════════════════════════════════════════════════
    // SERVICE WORKER — Registro
    // Se registra en 'load' (no 'DOMContentLoaded') para no
    // competir con la carga inicial de la página.
    // ═══════════════════════════════════════════════════════════
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js')
          .then(function(registration) {
            console.log('AutoValeur — SW registrado, scope:', registration.scope);
          })
          .catch(function(error) {
            // El SW falla silenciosamente en file:// — normal en desarrollo sin servidor
            console.warn('AutoValeur — SW no se pudo registrar:', error.message);
          });
      });
    }

    // ═══════════════════════════════════════════════════════════
    // PWA INSTALL — Lógica bifurcada iOS / Android
    // ═══════════════════════════════════════════════════════════

    // Android Chrome: capturar el evento beforeinstallprompt
    // para mostrarlo cuando el usuario quiera instalar
    var deferredInstallPrompt = null;

    window.addEventListener('beforeinstallprompt', function(event) {
      // Prevenir que Chrome muestre el mini-infobar automático
      event.preventDefault();
      deferredInstallPrompt = event;
      console.log('AutoValeur — Install prompt capturado (Android)');
      // En fases futuras: mostrar un botón "Installer l'app" en la UI
    });

    window.addEventListener('appinstalled', function() {
      console.log('AutoValeur — App instalada correctamente');
      deferredInstallPrompt = null;
    });

    // iOS Safari: no hay beforeinstallprompt — mostrar banner con instrucciones manuales
    (function checkIOSInstall() {
      var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
      // window.navigator.standalone = true cuando ya está instalada como PWA en iOS
      var isInStandaloneMode = window.navigator.standalone === true
        || window.matchMedia('(display-mode: standalone)').matches;

      if (isIOS && !isInStandaloneMode) {
        var banner = document.getElementById('ios-install-banner');
        if (banner) {
          // Mostrar con pequeño delay para no bloquear la carga visual
          setTimeout(function() {
            banner.classList.add('visible');
          }, 2000);
        }
      }
    })();

  </script>
