<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Estimez la valeur de votre voiture d'occasion au Maroc — transparent, offline, gratuit.">
  <title>AutoValeur MA</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <style>
    /* CSS BASE — será completado en el plan 01-05 */
    /* Placeholder mínimo para que la página sea usable durante el desarrollo */
    body { font-family: system-ui, sans-serif; margin: 0; background: #f8f9fa; }
    .page { padding: 1rem; padding-bottom: 5rem; }
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff; border-top: 1px solid #e0e0e0;
      display: flex; height: 56px;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: none; border: none; font-size: 0.75rem;
      cursor: pointer; color: #5f6368;
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1 class="app-title">AutoValeur MA</h1>
  </header>

  <main>

    <!-- PÁGINA: Estimer (visible por defecto) -->
    <section id="page-estimer" class="page page-estimer">
      <h2>Estimer</h2>
      <p>Formulaire d'estimation — <em>Phase 4</em></p>
    </section>

    <!-- PÁGINA: Historique -->
    <section id="page-historique" class="page page-historique" hidden>
      <h2>Historique</h2>
      <p>Historique des estimations — <em>Phase 5</em></p>
    </section>

    <!-- PÁGINA: Comparer -->
    <section id="page-comparer" class="page page-comparer" hidden>
      <h2>Comparer</h2>
      <p>Comparer deux estimations — <em>Phase 5</em></p>
    </section>

  </main>

  <!-- NAVEGACIÓN INFERIOR -->
  <nav class="bottom-nav" role="navigation" aria-label="Navigation principale">

    <button class="nav-item active" data-page="estimer" aria-label="Estimer">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/>
      </svg>
      <span>Estimer</span>
    </button>

    <button class="nav-item" data-page="historique" aria-label="Historique">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      <span>Historique</span>
    </button>

    <button class="nav-item" data-page="comparer" aria-label="Comparer">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
      <span>Comparer</span>
    </button>

  </nav>

  <script>
    'use strict';

    // ═══════════════════════════════════════════════════════════
    // ROUTER — Hash-based SPA navigation
    // Cada página es una <section class="page" id="page-X">.
    // La navegación usa location.hash; el botón Atrás funciona
    // de forma nativa porque cada hash push añade entrada al
    // historial del browser.
    // ═══════════════════════════════════════════════════════════

    const ROUTES = {
      '':           'estimer',
      'estimer':    'estimer',
      'historique': 'historique',
      'comparer':   'comparer'
    };

    const Router = {
      /**
       * Navegar a una página por nombre.
       * Usa location.hash = (no location.replace) para que el
       * botón Atrás funcione correctamente.
       * @param {string} page - 'estimer' | 'historique' | 'comparer'
       */
      navigate(page) {
        location.hash = page;
      },

      /**
       * Leer el hash actual y mostrar la página correspondiente.
       * Llamado en 'hashchange' y en 'DOMContentLoaded'.
       */
      _show() {
        const hash = location.hash.replace('#', '') || 'estimer';
        const pageId = ROUTES[hash] || 'estimer';

        // Ocultar todas las páginas
        document.querySelectorAll('.page').forEach(function(p) {
          p.hidden = true;
        });

        // Mostrar la página activa
        const target = document.getElementById('page-' + pageId);
        if (target) {
          target.hidden = false;
        }

        // Actualizar estado activo en la nav inferior
        document.querySelectorAll('.nav-item').forEach(function(btn) {
          btn.classList.toggle('active', btn.dataset.page === pageId);
        });
      },

      /**
       * Inicializar el router: conectar botones de nav y
       * mostrar la página correcta según el hash inicial.
       */
      init() {
        // Escuchar cambios de hash (botón Atrás incluido)
        window.addEventListener('hashchange', function() {
          Router._show();
        });

        // Conectar botones de la nav inferior
        document.querySelectorAll('.nav-item').forEach(function(btn) {
          btn.addEventListener('click', function() {
            Router.navigate(btn.dataset.page);
          });
        });

        // Mostrar la página inicial según el hash (o Estimer por defecto)
        Router._show();
      }
    };

    // ═══════════════════════════════════════════════════════════
    // INIT — Arrancar cuando el DOM esté listo
    // ═══════════════════════════════════════════════════════════
    document.addEventListener('DOMContentLoaded', function() {
      Router.init();
      console.log('AutoValeur MA — Router inicializado');
    });

  </script>

</body>
</html>
